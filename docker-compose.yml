# Oren Studio AI — local development infrastructure
# Usage: `make up` (see Makefile) or `docker compose up -d`
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: oren-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oren_studio}
      POSTGRES_USER: ${POSTGRES_USER:-oren_studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oren_studio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: oren-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: oren-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: oren-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-change-me}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data

  # Self-hosted SearXNG — free-tier search for high-volume Trend/Research Agent queries
  # (see docs/open-source-landscape.md, section 6)
  searxng:
    image: searxng/searxng:latest
    container_name: oren-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./docker/searxng:/etc/searxng

volumes:
  pg_data:
  redis_data:
  qdrant_data:
  minio_data:

# NOTE: apps/api, apps/web, agents/*, and services/* are intentionally NOT
# containerized yet — Phase 1 is infra-only. Application Dockerfiles get
# added under docker/ once each app/service has real code (see ROADMAP.md).
