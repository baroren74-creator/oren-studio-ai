[project]
name = "oren-studio-core"
version = "0.1.0"
description = "Shared, provider-agnostic domain code for Oren Studio AI (schemas, events, agent registry)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7,<3",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["core*"]
